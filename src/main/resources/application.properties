# Sử dụng MySQL Driver thay vì SQL Server
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Cấu hình dialect cho MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Cho phép chạy file data.sql khi khởi động
spring.sql.init.mode=always

# (Tùy chọn) Nếu bạn muốn Hibernate tạo bảng từ Entity trước rồi mới chạy data.sql
spring.jpa.defer-datasource-initialization=true